{{- if .Values.serviceAccount.create -}}
apiVersion: v1
automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
kind: ServiceAccount
metadata:
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    {{- include "cobbler-tftp.labels" . | nindent 4 }}
  name: {{ include "cobbler-tftp.serviceAccountName" . }}
{{- end }}
