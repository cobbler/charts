apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "cobbler-tftp.fullname" . }}-test-connection"
  labels:
    {{- include "cobbler-tftp.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: tftp
      image: ghcr.io/cobbler/cobbler-tftp:v0.1.0a6
      command: ['tftp']
      args: ['{{ include "cobbler-tftp.fullname" . }}', '{{ .Values.service.port }}', '-c', 'status']
  restartPolicy: Never
