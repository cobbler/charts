# Issues that affect this repository:
# - https://github.com/stackrox/kube-linter/issues/459
# - https://github.com/stackrox/kube-linter/issues/1194

checks:
  addAllBuiltIn: true
  ignorePaths:
    - "**/gotk-components.yaml"  # Autogenerated FLuxCD manifests
  exclude:
    - dangling-servicemonitor  # There seems to be a bug in the implementation of this.
    - unset-cpu-requirements  # We don't want to set CPU limits.
    # Doesn't make sense for Helm Charts
    - dnsconfig-options
    - unset-memory-requirements # Set by user in values.yaml
    - required-annotation-email # Set by user in values.yaml
    - required-label-owner # Set by user in values.yaml
    - use-namespace  # Set implicitly through target deployment namespace
    - minimum-three-replicas  # Set by user in values.yaml
    - no-node-affinity # Set by user in values.yaml
    - no-rolling-update-strategy
    - non-isolated-pod  # We cannot know which network layout the user desiresclear
    - sorted-keys  # We cannot ensure global order for labels and annotations. See gh#1194.
